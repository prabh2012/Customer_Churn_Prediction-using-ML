<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container py-5">

    <div class="title-card text-center mb-5">
        <i class="fa-solid fa-chart-line display-3 text-primary mb-3"></i>
        <h1>Customer Churn Prediction</h1>
        <p>
            Predict whether a telecom customer is likely to leave the company
            using Machine Learning.
        </p>
    </div>

    <div class="form-card">

        <form action="/predict" method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Gender</label>
                    <select name="gender" class="form-control">
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Senior Citizen</label>
                    <select name="SeniorCitizen" class="form-control">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Partner</label>
                    <select name="Partner" class="form-control">
                        <option>No</option>
                        <option>Yes</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Dependents</label>
                    <select name="Dependents" class="form-control">
                        <option>No</option>
                        <option>Yes</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Tenure (Months)</label>
                    <input type="number" class="form-control" name="tenure" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Phone Service</label>
                    <select name="PhoneService" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Multiple Lines</label>
                    <select name="MultipleLines" class="form-control">
                        <option>No</option>
                        <option>Yes</option>
                        <option>No phone service</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Internet Service</label>
                    <select name="InternetService" class="form-control">
                        <option>DSL</option>
                        <option>Fiber optic</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Online Security</label>
                    <select name="OnlineSecurity" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Online Backup</label>
                    <select name="OnlineBackup" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Device Protection</label>
                    <select name="DeviceProtection" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Tech Support</label>
                    <select name="TechSupport" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Streaming TV</label>
                    <select name="StreamingTV" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Streaming Movies</label>
                    <select name="StreamingMovies" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Contract</label>
                    <select name="Contract" class="form-control">
                        <option>Month-to-month</option>
                        <option>One year</option>
                        <option>Two year</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Paperless Billing</label>
                    <select name="PaperlessBilling" class="form-control">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Payment Method</label>
                    <select name="PaymentMethod" class="form-control">
                        <option>Electronic check</option>
                        <option>Mailed check</option>
                        <option>Bank transfer (automatic)</option>
                        <option>Credit card (automatic)</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Monthly Charges ($)</label>
                    <input type="number" step="0.01" class="form-control" name="MonthlyCharges" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Total Charges ($)</label>
                    <input type="number" step="0.01" class="form-control" name="TotalCharges" required>
                </div>

            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary btn-lg px-5">
                    <i class="fa-solid fa-magnifying-glass-chart"></i>
                    Predict Churn
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
